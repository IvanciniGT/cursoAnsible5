# Estos son MUY SENCILLOS DE CREAR. Nos encanta la sintaxis.

# id_entorno    <propiedades adicionales de ansible>    <variables>

# propiedades adicionales de ansible:
#   ansible_host = Dato que usa ansible para conetarse al entorno (IP o fqdn)
#   ansible_connection = Protocolo para comunicarse con el entorno (default ssh)
#                        ssh | winrm |local
#   ansible_port = A que puerto te conectas... por defecto 22=ssh
#   ansible_user = Con que usuario me conecto

# Eins??? Esto en fichero? PODEMOS... PERO NI DE COÑA!... Ya se encarga el Automation Platform de aportar esto..
# Esto vale para pruebas en local / entornos dev.
#   ansible_password = Con que contraseña me conecto
#   ansible_ssh_private_key_file = Con que clave privada ssh me conecto

# Listado completo: https://docs.ansible.com/ansible/latest/inventory_guide/intro_inventory.html#connecting-to-hosts-behavioral-inventory-parameters

mipc ansible_host=localhost ansible_connection=local version_apache=17.4.2 # Y más variables... todas las que quiera


# Los entornos se pueden agrupar en GRUPOS
#[nombre grupo]
[webservers]

[webservers:children]
nginx
apache

[apache]
apache.desa ansible_host=apache.desa.miempresa.net ansible_connection=ssh # variables
apache.test ansible_host=apache.test.miempresa.net ansible_connection=ssh
apache.prod ansible_host=apache.prod.miempresa.net ansible_connection=ssh

[nginx]
nginx[01:20] ansible_connection=ssh

[webservers:vars]
puerto=80
ansible_ssh_private_key_file=/RUTA/DE/MI/CLAVE


