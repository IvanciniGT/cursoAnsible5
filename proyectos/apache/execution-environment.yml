---
# Definición del Execution Environment (EE) para ansible-navigator,
# construido con ansible-builder (formato v3).
#
#   python --version  #a ver si responde la 3?
#   python -m pip install ansible-navigator ansible-builder
#   Si no responde la 3:
#   python3 --version
#   python3 -m pip install ansible-navigator ansible-builder
#   ansible-builder build -t apache-ee:latest -f execution-environment.yml -v3
#
# Estrategia: base LIMPIA con Python 3.11 (sin ansible) y dejamos que
# ansible-builder instale ansible-core 2.16 + ansible-runner + las colecciones.
# - Python 3.11 porque ansible-core 2.16 exige Python >= 3.10 en el controlador.
# - ansible-core 2.16 porque es el último que soporta Python 3.6 en el NODO,
#   necesario para gestionar RHEL/Rocky 8 con su dnf (ver CHANGELOG.md).

version: 3

images:
  base_image:
    name: docker.io/library/python:3.11-slim

options:
  package_manager_path: /usr/bin/apt-get   # base Debian (python:3.11-slim)

dependencies:
  ansible_core:
    package_pip: ansible-core>=2.16,<2.17
  ansible_runner:
    package_pip: ansible-runner
  galaxy: requirements.yml

additional_build_steps:
  prepend_base:
    # Cliente SSH para conectar a los nodos (la base slim no lo trae)
    - RUN apt-get update && apt-get install -y --no-install-recommends openssh-client && rm -rf /var/lib/apt/lists/*
    # python:3.11-slim instala python en /usr/local/bin; ansible-builder espera /usr/bin/python3
    - RUN ln -sf /usr/local/bin/python3 /usr/bin/python3
