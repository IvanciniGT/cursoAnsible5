
distros_soportadas:    # familias soportadas (ver variable 'familia' en carga.datos)
  - redhat
  - ubuntu

paquetes:
  - nombre:                 git
    version:                2.54.0 # ultima estable (abril 2026)
    # OJO/BUG: con 'major'/'minor' el glob (p.ej. "2*") se pasa tal cual a apt en la
    # ruta de prerrequisitos (utils/ubuntu), y apt NO admite globs en paquete=version
    # (dnf sí). La ruta de apache sí resuelve la versión candidata antes (madison).
    # Para prereqs (git/curl son herramientas) usamos 'latest' y evitamos el glob.
    version_matching:       latest  #minor, major, equals, latest. DEFAULT: EQUALS
    redhat:
      directorio_configuracion_aplicacion: 
      repo:                        # git viene en los repos base/AppStream de RHEL/Rocky -> sin repo extra
    ubuntu:
      directorio_configuracion_aplicacion: 
      repo:                        # PPA oficial git-core (Ubuntu Git Maintainers) en formato deb822
        nombre:             git-core
        uris:               https://ppa.launchpadcontent.net/git-core/ppa/ubuntu
        suites:             "{{ ansible_distribution_release }}"
        components:         main
        clave:              https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xE1DD270288B4E6030699E45FA1715D88E1DF1F24
  - nombre:                 curl
    version_matching:       latest  # de los repos oficiales de la distro, sin repo extra

# Rutas absolutas (no '~'): hay tareas con y sin become y '~' apuntaría a /root o
# /home/vagrant según el usuario, descuadrando origen/destino. /var/tmp es accesible por ambos.
directorio_temporal_clonado_aplicacion: /var/tmp/ansible_app_deploy
directorio_backups_aplicacion: /var/tmp/ansible_app_backups