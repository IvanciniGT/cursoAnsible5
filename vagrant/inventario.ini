# Inventario Ansible para las VMs del curso (Vagrant + VirtualBox)
#
# Prueba la conexión desde la carpeta vagrant/:
#   ansible -i inventario.ini all -m ping
#
# Las claves SSH las genera Vagrant en .vagrant/machines/<vm>/virtualbox/private_key

[redhat]
rocky8 ansible_host=192.168.56.21 ansible_ssh_private_key_file=.vagrant/machines/rocky8/virtualbox/private_key

[debian]
ubuntu22 ansible_host=192.168.56.22 ansible_ssh_private_key_file=.vagrant/machines/ubuntu22/virtualbox/private_key

[curso:children]
redhat
debian

[curso:vars]
ansible_user=vagrant
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
